# 打标签后构建 3 个 release APK 并发布到 GitHub Releases。
#
# 产物（前缀 vstv）：
#   vstv-<ver>-all-sdk21.apk           — 常规 + 台标（包名 com.vesaa.mytv）
#   vstv-<ver>-all-sdk21-lite.apk      — lite 无台标（低配盒子；在线更新会匹配本附件）
#   vstv-<ver>-all-sdk21-HarmonyOS.apk — 鸿蒙/兼容向 + 台标（包名 com.chinablue.tv，桌面名 Z视介）
#
# 标签：v*.*.*、v*.*.*-*（本仓库 1.0.x 等正式线；推送标签前须已写入 CHANGELOG 对应章节，见下方校验步骤）
# Secrets（正式发版请配置齐）：KEYSTORE_BASE64、KEYSTORE_PASSWORD、KEY_ALIAS、KEY_PASSWORD、PROPRIETARY_AGE_PASSPHRASE
# 未配置 KEYSTORE_BASE64 时仍用 Debug 签名（各次 CI 证书可能不同，无法稳定覆盖安装）。
# PKCS12 密钥库需在 Assemble 步骤传入 KEYSTORE_TYPE（与 app/build.gradle.kts 一致）。

name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GRADLE_OPTS: -Xmx4096m -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare builtin endpoints bundle
        env:
          PROPRIETARY_AGE_PASSPHRASE: ${{ secrets.PROPRIETARY_AGE_PASSPHRASE }}
        run: bash scripts/ci-restore-proprietary.sh

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Prepare keystore (optional)
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "已使用仓库 Secret 中的 Release 签名"
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置 KEYSTORE_BASE64，将使用 Debug 签名打包（仅供测试）。"
          fi

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="$TAG"
          VER="${VER#v}"
          VER="${VER#tv-}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          VER_NUM="${VER%%-*}"
          echo "versionCore=$VER_NUM" >> "$GITHUB_OUTPUT"
          IFS='.' read -r A B C <<< "$VER_NUM"
          A=${A:-0}
          B=${B:-0}
          C=${C:-0}
          VC=$((10#$A * 1000000 + 10#$B * 1000 + 10#$C))
          echo "versionCode=$VC" >> "$GITHUB_OUTPUT"
          echo "Release version=$VER versionCore=$VER_NUM versionCode=$VC (from tag $TAG)"

      - name: Verify CHANGELOG has section for this release
        run: |
          set -euo pipefail
          CORE="${{ steps.ver.outputs.versionCore }}"
          if [ -z "$CORE" ]; then
            echo "::error::未能解析 versionCore"
            exit 1
          fi
          if ! grep -qF "## [${CORE}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md 缺少本版章节「## [${CORE}]」。请先在 main 上提交 CHANGELOG 再推送标签。"
            exit 1
          fi
          echo "CHANGELOG OK: found ## [${CORE}]"

      - name: Assemble all release variants
        env:
          KEYSTORE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_TYPE: PKCS12
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          VER="${{ steps.ver.outputs.version }}"
          VC="${{ steps.ver.outputs.versionCode }}"
          ARGS=(
            assembleRelease
            --no-daemon
            --build-cache
            "-PreleaseVersion=$VER"
            "-PversionCode=$VC"
          )
          if [ "${{ steps.sign.outputs.mode }}" = "debug" ]; then
            ARGS+=(-PciUseDebugSigning=true)
          fi
          for attempt in 1 2 3; do
            if ./gradlew "${ARGS[@]}" --stacktrace; then
              exit 0
            fi
            echo "::warning::Gradle 失败，第 $attempt 次重试（30s 后）…"
            sleep 30
          done
          exit 1

      - name: Package artifacts
        if: success()
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          ROOT="$GITHUB_WORKSPACE"
          mkdir -p "$ROOT/artifacts"
          echo "=== 构建输出目录（全部 APK）==="
          find "$ROOT/app/build/outputs/apk" -name "*.apk" -type f 2>/dev/null | sort || true

          pick_apk() {
            local flavor="$1"
            local dir="$ROOT/app/build/outputs/apk/${flavor}/release"
            if [[ ! -d "$dir" ]]; then
              echo "::error::缺少输出目录: $dir"
              return 1
            fi
            local apk=""
            apk=$(find "$dir" -type f -name "*.apk" ! -name "*-unsigned.apk" ! -name "*unaligned*" 2>/dev/null | head -n1 || true)
            if [[ -z "$apk" ]]; then
              apk=$(find "$dir" -type f -name "*.apk" 2>/dev/null | head -n1 || true)
            fi
            if [[ -z "$apk" || ! -f "$apk" ]]; then
              echo "::error::在 $dir 中未找到 APK（flavor=${flavor}）"
              find "$ROOT/app/build/outputs/apk" -type f 2>/dev/null | head -50 || true
              return 1
            fi
            echo "选用 [$flavor]: $apk" >&2
            printf '%s\n' "$apk"
          }

          copy_flavor() {
            local flavor="$1"
            local dest="$2"
            local src
            src=$(pick_apk "$flavor")
            cp "$src" "$dest"
            SO_COUNT=$(unzip -l "$dest" 2>/dev/null | grep -c '\.so$' || true)
            echo "$dest — .so 数量: ${SO_COUNT:-0}"
            ls -lh "$dest"
          }

          copy_flavor "originalWithLogo" "$ROOT/artifacts/vstv-${VER}-all-sdk21.apk"
          copy_flavor "originalLite" "$ROOT/artifacts/vstv-${VER}-all-sdk21-lite.apk"
          copy_flavor "disguisedWithLogo" "$ROOT/artifacts/vstv-${VER}-all-sdk21-HarmonyOS.apk"

          echo "=== 即将上传的 artifacts ==="
          ls -lh "$ROOT/artifacts/"

      # GitHub 自带的 generate_release_notes 多为提交列表 +「Full Changelog」链接，可读性差。
      # 正式说明以仓库根目录 CHANGELOG.md 中对应「## [x.y.z]」章节为准，写入 Release 正文。
      - name: Prepare release notes from CHANGELOG
        env:
          VERSION_CORE: ${{ steps.ver.outputs.versionCore }}
        run: |
          python3 << 'PY'
          import os
          import pathlib
          import re
          import sys

          core = os.environ["VERSION_CORE"]
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^## \[{re.escape(core)}\].*?(?=^## \[|\Z)"
          m = re.search(pattern, text, re.MULTILINE | re.DOTALL)
          if not m:
              print(f"::error::未能从 CHANGELOG.md 提取 ## [{core}] 章节正文", file=sys.stderr)
              sys.exit(1)
          body = m.group(0).rstrip() + "\n"
          pathlib.Path("release_body.md").write_text(body, encoding="utf-8")
          print("---- release_body.md（预览，截断）----")
          print(body[:4000] if len(body) > 4000 else body)
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: artifacts/*
          body_path: release_body.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
