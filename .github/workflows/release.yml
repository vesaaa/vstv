# 打标签后构建 2 个 release APK 并发布到 GitHub Releases。
#
# 产物（前缀 vstv）：
#   vstv-<ver>-all-sdk21.apk          — 常规版（包名 top.yogiczy.mytv）
#   vstv-<ver>-all-sdk21-HarmonyOS.apk — 鸿蒙/兼容向（包名 com.chinablue.tv，桌面名 Z视介）
#
# 标签：v*.*.*、v*.*.*-*（本 fork 仅使用 v0.0.x 发行线）
# Secret（可选）：KEYSTORE_BASE64、KEYSTORE_PASSWORD、KEY_ALIAS、KEY_PASSWORD；未配置则用 Debug 签名。

name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GRADLE_OPTS: -Xmx4096m -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Prepare keystore (optional)
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "已使用仓库 Secret 中的 Release 签名"
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置 KEYSTORE_BASE64，将使用 Debug 签名打包（仅供测试）。"
          fi

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="$TAG"
          VER="${VER#v}"
          VER="${VER#tv-}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          VER_NUM="${VER%%-*}"
          IFS='.' read -r A B C <<< "$VER_NUM"
          A=${A:-0}
          B=${B:-0}
          C=${C:-0}
          VC=$((10#$A * 1000000 + 10#$B * 1000 + 10#$C))
          echo "versionCode=$VC" >> "$GITHUB_OUTPUT"
          echo "Release version=$VER versionCode=$VC (from tag $TAG)"

      - name: Assemble all release variants
        env:
          KEYSTORE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          VER="${{ steps.ver.outputs.version }}"
          VC="${{ steps.ver.outputs.versionCode }}"
          ARGS=(
            assembleRelease
            --no-daemon
            --build-cache
            "-PreleaseVersion=$VER"
            "-PversionCode=$VC"
          )
          if [ "${{ steps.sign.outputs.mode }}" = "debug" ]; then
            ARGS+=(-PciUseDebugSigning=true)
          fi
          for attempt in 1 2 3; do
            if ./gradlew "${ARGS[@]}" --stacktrace; then
              exit 0
            fi
            echo "::warning::Gradle 失败，第 $attempt 次重试（30s 后）…"
            sleep 30
          done
          exit 1

      - name: Package artifacts
        if: success()
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          ROOT="$GITHUB_WORKSPACE"
          mkdir -p "$ROOT/artifacts"
          echo "=== 构建输出目录（全部 APK）==="
          find "$ROOT/app/build/outputs/apk" -name "*.apk" -type f 2>/dev/null | sort || true

          pick_apk() {
            local flavor="$1"
            local dir="$ROOT/app/build/outputs/apk/${flavor}/release"
            if [[ ! -d "$dir" ]]; then
              echo "::error::缺少输出目录: $dir"
              return 1
            fi
            local apk=""
            apk=$(find "$dir" -type f -name "*.apk" ! -name "*-unsigned.apk" ! -name "*unaligned*" 2>/dev/null | head -n1 || true)
            if [[ -z "$apk" ]]; then
              apk=$(find "$dir" -type f -name "*.apk" 2>/dev/null | head -n1 || true)
            fi
            if [[ -z "$apk" || ! -f "$apk" ]]; then
              echo "::error::在 $dir 中未找到 APK（flavor=${flavor}）"
              find "$ROOT/app/build/outputs/apk" -type f 2>/dev/null | head -50 || true
              return 1
            fi
            echo "选用 [$flavor]: $apk" >&2
            printf '%s\n' "$apk"
          }

          copy_flavor() {
            local flavor="$1"
            local dest="$2"
            local src
            src=$(pick_apk "$flavor")
            cp "$src" "$dest"
            SO_COUNT=$(unzip -l "$dest" 2>/dev/null | grep -c '\.so$' || true)
            echo "$dest — .so 数量: ${SO_COUNT:-0}"
            ls -lh "$dest"
          }

          copy_flavor "original" "$ROOT/artifacts/vstv-${VER}-all-sdk21.apk"
          copy_flavor "disguised" "$ROOT/artifacts/vstv-${VER}-all-sdk21-HarmonyOS.apk"

          echo "=== 即将上传的 artifacts ==="
          ls -lh "$ROOT/artifacts/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
