# 打标签后自动构建 release APK 并发布到 GitHub Releases。
#
# 支持的标签示例：v1.2.3、v1.2.3-beta、tv-3.3.9（版本号会去掉前缀 v / tv-）
#
# 需在仓库 Settings → Secrets and variables → Actions 中配置：
#   KEYSTORE_BASE64  —— keystore.jks 的 base64（整文件编码）
#   KEYSTORE_PASSWORD、KEY_ALIAS、KEY_PASSWORD
#
# 当前工程仅一种安装包（系统 WebView），产物命名为：
#   vstv-<版本>-all-sdk21-original.apk
# 若日后增加 disguised（包名伪装）或 X5（腾讯 TBS WebView）等 productFlavor，可在此 workflow 中追加 assemble 与复制步骤。

name: Release

on:
  push:
    tags:
      # 例如 v1.4.5、v1.4.5-beta.1
      - "v*.*.*"
      - "v*.*.*-*"
      # 例如 tv-3.3.9（仅作标签习惯，与 APK 前缀 vstv- 无关）
      - "tv-*.*.*"
      - "tv-*.*.*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::未配置 Secret KEYSTORE_BASE64，无法签名 release APK。"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="$TAG"
          VER="${VER#v}"
          VER="${VER#tv-}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release version: $VER (from tag $TAG)"

      - name: Assemble release
        env:
          KEYSTORE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -PreleaseVersion="${{ steps.ver.outputs.version }}"

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::未找到 release APK"
            exit 1
          fi
          # 当前仅单产物；多 flavor 时可改为循环命名
          cp "${apks[0]}" "artifacts/vstv-${{ steps.ver.outputs.version }}-all-sdk21-original.apk"
          ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
