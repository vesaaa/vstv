# 打标签后自动构建 release APK 并发布到 GitHub Releases。
#
# 支持的标签示例：v1.2.3、v1.2.3-beta、tv-3.3.9（版本号会去掉前缀 v / tv-）
#
# 可选 Secret（正式签名，推荐上架/长期使用前配置）：
#   KEYSTORE_BASE64、KEYSTORE_PASSWORD、KEY_ALIAS、KEY_PASSWORD
# 未配置时：使用 Android Debug 密钥签名，可正常出包试用，勿用于商店上架。
#
# 产物命名：vstv-<版本>-all-sdk21-original.apk

name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
      - "tv-*.*.*"
      - "tv-*.*.*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # 消除 Actions 对 Node 20 的弃用告警，提前使用 Node 24 运行 JS actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Prepare keystore (optional)
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "已使用仓库 Secret 中的 Release 签名"
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置 KEYSTORE_BASE64，将使用 Debug 签名打包（仅供测试）。正式发行请到仓库 Settings → Secrets 配置 KEYSTORE_*。"

          fi

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="$TAG"
          VER="${VER#v}"
          VER="${VER#tv-}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release version: $VER (from tag $TAG)"

      - name: Assemble release
        env:
          KEYSTORE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ARGS=(assembleRelease --no-daemon "-PreleaseVersion=${{ steps.ver.outputs.version }}")
          if [ "${{ steps.sign.outputs.mode }}" = "debug" ]; then
            ARGS+=(-PciUseDebugSigning=true)
          fi
          ./gradlew "${ARGS[@]}"

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          shopt -s nullglob
          cd app/build/outputs/apk/release
          apks=(*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::未找到 release APK"
            exit 1
          fi
          echo "=== release 目录内 APK（用于核对体积）==="
          ls -lh *.apk
          # 优先使用标准单包名，避免误选其它产物
          if [ -f app-release.apk ]; then
            SRC="app-release.apk"
          else
            SRC="${apks[0]}"
            echo "::notice::未找到 app-release.apk，使用: $SRC"
          fi
          SO_COUNT=$(unzip -l "$SRC" 2>/dev/null | grep -c '\.so$' || true)
          echo "选中文件: $SRC，内含 .so 数量: $SO_COUNT"
          cd "$GITHUB_WORKSPACE"
          cp "app/build/outputs/apk/release/$SRC" "artifacts/vstv-${{ steps.ver.outputs.version }}-all-sdk21-original.apk"
          ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
