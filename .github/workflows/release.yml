# 打标签后构建 4 个 release APK 并发布到 GitHub Releases。
#
# 产物（与常见 mytv 命名对齐，前缀为 vstv）：
#   vstv-<ver>-all-sdk21-original.apk
#   vstv-<ver>-all-sdk21-disguised.apk
#   vstv-<ver>-arm64-v8a-sdk21-original-X5.apk
#   vstv-<ver>-armeabi-v7a-sdk21-original-X5.apk
#
# 标签：v*.*.*、v*.*.*-*、tv-*.*.*、tv-*.*.*-*
# Secret（可选）：KEYSTORE_BASE64、KEYSTORE_PASSWORD、KEY_ALIAS、KEY_PASSWORD；未配置则用 Debug 签名。

name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
      - "tv-*.*.*"
      - "tv-*.*.*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Prepare keystore (optional)
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "已使用仓库 Secret 中的 Release 签名"
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置 KEYSTORE_BASE64，将使用 Debug 签名打包（仅供测试）。"

          fi

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="$TAG"
          VER="${VER#v}"
          VER="${VER#tv-}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release version: $VER (from tag $TAG)"

      - name: Assemble all release variants
        env:
          KEYSTORE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ARGS=(assembleRelease --no-daemon "-PreleaseVersion=${{ steps.ver.outputs.version }}")
          if [ "${{ steps.sign.outputs.mode }}" = "debug" ]; then
            ARGS+=(-PciUseDebugSigning=true)
          fi
          ./gradlew "${ARGS[@]}"

      - name: Package artifacts
        run: |
          set -e
          VER="${{ steps.ver.outputs.version }}"
          ROOT="$GITHUB_WORKSPACE"
          mkdir -p "$ROOT/artifacts"
          echo "=== 构建输出目录 ==="
          find "$ROOT/app/build/outputs/apk" -name "*.apk" -type f | sort || true

          copy_apk() {
            local src="$1"
            local dest="$2"
            if [[ ! -f "$src" ]]; then
              echo "::error::缺少 APK: $src"
              exit 1
            fi
            cp "$src" "$dest"
            SO_COUNT=$(unzip -l "$dest" 2>/dev/null | grep -c '\.so$' || true)
            echo "$dest — .so 数量: ${SO_COUNT:-0}"
            ls -lh "$dest"
          }

          copy_apk "$ROOT/app/build/outputs/apk/original/release/app-original-release.apk" \
            "$ROOT/artifacts/vstv-${VER}-all-sdk21-original.apk"
          copy_apk "$ROOT/app/build/outputs/apk/disguised/release/app-disguised-release.apk" \
            "$ROOT/artifacts/vstv-${VER}-all-sdk21-disguised.apk"
          copy_apk "$ROOT/app/build/outputs/apk/originalX5Arm64/release/app-originalX5Arm64-release.apk" \
            "$ROOT/artifacts/vstv-${VER}-arm64-v8a-sdk21-original-X5.apk"
          copy_apk "$ROOT/app/build/outputs/apk/originalX5Armeabi/release/app-originalX5Armeabi-release.apk" \
            "$ROOT/artifacts/vstv-${VER}-armeabi-v7a-sdk21-original-X5.apk"

          echo "=== 即将上传的 artifacts ==="
          ls -lh "$ROOT/artifacts/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
