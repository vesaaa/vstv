# 打标签后构建 4 个 release APK 并发布到 GitHub Releases。
#
# 产物（与常见 mytv 命名对齐，前缀为 vstv）：
#   vstv-<ver>-all-sdk21-original.apk
#   vstv-<ver>-all-sdk21-disguised.apk
#   vstv-<ver>-arm64-v8a-sdk21-original-X5.apk
#   vstv-<ver>-armeabi-v7a-sdk21-original-X5.apk
#
# 标签：v*.*.*、v*.*.*-*（本 fork 仅使用 v0.0.x 发行线）
# Secret（可选）：KEYSTORE_BASE64、KEYSTORE_PASSWORD、KEY_ALIAS、KEY_PASSWORD；未配置则用 Debug 签名。

name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 避免 R8/多 flavor 同时构建时 2G 堆 OOM
      GRADLE_OPTS: -Xmx4096m -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Prepare keystore (optional)
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "已使用仓库 Secret 中的 Release 签名"
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置 KEYSTORE_BASE64，将使用 Debug 签名打包（仅供测试）。"

          fi

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="$TAG"
          VER="${VER#v}"
          VER="${VER#tv-}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release version: $VER (from tag $TAG)"

      - name: Assemble all release variants
        env:
          KEYSTORE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ARGS=(assembleRelease --no-daemon "-PreleaseVersion=${{ steps.ver.outputs.version }}")
          if [ "${{ steps.sign.outputs.mode }}" = "debug" ]; then
            ARGS+=(-PciUseDebugSigning=true)
          fi
          ./gradlew "${ARGS[@]}" --stacktrace

      - name: Package artifacts
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          ROOT="$GITHUB_WORKSPACE"
          mkdir -p "$ROOT/artifacts"
          echo "=== 构建输出目录（全部 APK）==="
          find "$ROOT/app/build/outputs/apk" -name "*.apk" -type f 2>/dev/null | sort || true

          # AGP 可能生成 app-<flavor>-release.apk 或带版本后缀等；避免硬编码文件名
          pick_apk() {
            local flavor="$1"
            local dir="$ROOT/app/build/outputs/apk/${flavor}/release"
            if [[ ! -d "$dir" ]]; then
              echo "::error::缺少输出目录: $dir"
              return 1
            fi
            local apk=""
            apk=$(find "$dir" -maxdepth 1 -type f \( -name "*.apk" \) ! -name "*-unsigned.apk" ! -name "*unaligned*" | head -n1 || true)
            if [[ -z "$apk" ]]; then
              apk=$(find "$dir" -maxdepth 1 -type f -name "*.apk" | head -n1 || true)
            fi
            if [[ -z "$apk" || ! -f "$apk" ]]; then
              echo "::error::在 $dir 中未找到 APK（flavor=${flavor}）"
              ls -la "$dir" || true
              return 1
            fi
            echo "选用 [$flavor]: $apk" >&2
            printf '%s\n' "$apk"
          }

          copy_flavor() {
            local flavor="$1"
            local dest="$2"
            local src
            src=$(pick_apk "$flavor")
            cp "$src" "$dest"
            SO_COUNT=$(unzip -l "$dest" 2>/dev/null | grep -c '\.so$' || true)
            echo "$dest — .so 数量: ${SO_COUNT:-0}"
            ls -lh "$dest"
          }

          copy_flavor "original" "$ROOT/artifacts/vstv-${VER}-all-sdk21-original.apk"
          copy_flavor "disguised" "$ROOT/artifacts/vstv-${VER}-all-sdk21-disguised.apk"
          copy_flavor "originalX5Arm64" "$ROOT/artifacts/vstv-${VER}-arm64-v8a-sdk21-original-X5.apk"
          copy_flavor "originalX5Armeabi" "$ROOT/artifacts/vstv-${VER}-armeabi-v7a-sdk21-original-X5.apk"

          echo "=== 即将上传的 artifacts ==="
          ls -lh "$ROOT/artifacts/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
