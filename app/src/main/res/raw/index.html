<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>VsTV</title>
    <link href="./index_css.css" rel="stylesheet" />
    <script src="./index_js.js"></script>

    <style>
        .van-theme-dark body {
            color: #f5f5f5;
            background-color: black;
        }
    </style>
</head>

<body>
    <div class="min-h-100vh py-46px" id="app">
        <van-config-provider :theme="isDark ? 'dark' : 'light'">
            <!-- v-if 与 v-else 必须紧邻，中间不能有空白文本节点（部分 WebView 会触发 compiler-30） -->
            <div v-if="!settings"><van-empty image="network"></van-empty></div><div v-else>
                <div class="p-20px pt-0">
                    <div class="ml-16px text-32px">{{ settings.appTitle }}</div>
                    <div class="ml-16px text-gray text-14px">{{ settings.appRepo }}</div>
                </div>

                <van-cell-group inset title="通知">
                    <van-cell title="修改前请关闭电视端「设置」页，避免与网页同时写入"></van-cell>
                    <van-cell title="部分项修改后需重启应用生效"></van-cell>
                    <van-cell title="本页仅负责推送；订阅源列表、默认项、删除等请在 APP 设置中操作"></van-cell>
                </van-cell-group>

                <van-cell-group inset title="直播源">
                    <van-cell title="地址 + User-Agent 一组推送">
                        <template #label>
                            <van-space class="w-full" direction="vertical" size="small">
                                <span>与 APP 一致：<strong>直播源地址</strong>与<strong>请求头（含 User-Agent）</strong>绑定保存；拉取该订阅时会<strong>自动带上</strong>对应请求头。下方两项只需点<strong>一次</strong>「推送」。</span>
                                <div class="text-13px" style="word-break:break-all;">
                                    <div class="text-gray text-12px">当前表单（与下方输入同步）</div>
                                    <div class="mt-4px"><span class="text-gray">地址：</span>{{ summaryIptvUrl(settings) }}</div>
                                    <div class="mt-4px"><span class="text-gray">User-Agent：</span>{{ summaryUserAgent(settings) }}</div>
                                </div>
                                <span class="text-gray text-12px">请求头格式与程序内 <code>HttpHeaderLines</code> 一致：每行 <strong>Name: Value</strong>，<strong>第一个英文冒号</strong> <code>:</code> 分隔；<strong>不支持</strong> <code>Key=Value</code>。</span>
                                <span class="text-gray text-12px">示例：<code>User-Agent: okHttp/Mod-1.5.0.0</code></span>
                                <span class="text-gray text-12px">直播源地址</span>
                                <van-field class="!p-0" placeholder="粘贴订阅 URL（可为空）"
                                    v-model="settings.iptvSourceUrl" type="textarea" rows="2"></van-field>
                                <span class="text-gray text-12px">请求头（可含多行；常见为一条 User-Agent）</span>
                                <van-field class="!p-0" placeholder="每行 Name: Value"
                                    v-model="settings.iptvSourceRequestHeaders" type="textarea" rows="4"></van-field>
                                <van-button @click="pushIptv()" block type="primary" class="mt-8px">推送（地址与请求头一起生效）</van-button>
                            </van-space>
                        </template>
                    </van-cell>
                </van-cell-group>

                <van-cell-group inset title="本机设置页地址" v-if="settings.lanIPv4Candidates && settings.lanIPv4Candidates.length">
                    <van-cell title="检测到的局域网 IPv4">
                        <template #label>
                            <div>{{ settings.lanIPv4Candidates.join(' · ') }}</div>
                            <div class="text-gray text-12px mt-8px">若扫码无法打开，可尝试浏览器输入列表中其它 IP，端口 {{ settings.serverPort || 1616 }}</div>
                        </template>
                    </van-cell>
                    <van-cell title="手动指定展示 IP（可选）">
                        <template #label>
                            <van-field placeholder="留空则由电视自动选择" v-model="settings.httpServerAdvertiseIp"></van-field>
                        </template>
                        <template #extra>
                            <van-button @click="saveAdvertiseIp()" size="small" type="primary">保存</van-button>
                        </template>
                    </van-cell>
                </van-cell-group>

                <van-cell-group inset title="节目单">
                    <van-cell title="推送节目单地址">
                        <template #label>
                            <van-space class="w-full" direction="vertical" size="small">
                                <span>支持 xml、xml.gz；留空并推送则恢复内置默认。列表与默认项在 APP 设置中管理。</span>
                                <van-field class="!p-0" placeholder="留空推送 = 使用内置默认"
                                    v-model="settings.epgXmlUrl" type="textarea" rows="2"></van-field>
                            </van-space>
                        </template>
                        <template #extra>
                            <van-button @click="pushEpg()" size="small" type="primary">推送</van-button>
                        </template>
                    </van-cell>
                </van-cell-group>

                <van-cell-group inset title="播放器">
                    <van-cell title="自定义 UA">
                        <template #label>
                            <van-space class="w-full" direction="vertical" size="small">
                                <van-field class="!p-0" placeholder="置为空时恢复默认"
                                    v-model="settings.videoPlayerUserAgent" type="textarea" rows="2"></van-field>
                            </van-space>
                        </template>
                        <template #extra>
                            <van-button @click="pushPlayerUa()" size="small" type="primary">推送</van-button>
                        </template>
                    </van-cell>
                </van-cell-group>
            </div>
        </van-config-provider>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue

        const baseUrl = ""

        async function requestApi(url, config) {
            const resp = await fetch(`${baseUrl}${url}`, config)
            if (resp.status !== 200) {
                throw new Error(`请求失败：${resp.status}`)
            }
            return resp
        }

        function displayEmptyText(v) {
            const t = (v == null ? '' : String(v)).trim()
            return t || '（空）'
        }

        /** 网页表单默认请求头（设备存储为空时填入，便于一键推送） */
        const DEFAULT_IPTV_REQUEST_HEADERS = 'User-Agent: okHttp/Mod-1.5.0.0'

        /** 与 Kotlin parseHttpHeaderLines：首个 ':' 分隔、忽略 # 注释行 */
        function userAgentFromHeaderLines(s) {
            if (!s || !String(s).trim()) return ''
            for (const raw of String(s).split(/\r?\n/)) {
                const line = raw.trim()
                if (!line || line.startsWith('#')) continue
                const idx = line.indexOf(':')
                if (idx <= 0) continue
                const name = line.slice(0, idx).trim().toLowerCase()
                if (name === 'user-agent') return line.slice(idx + 1).trim()
            }
            return ''
        }

        createApp({
            setup() {
                const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                const settings = ref()

                function summaryIptvUrl(s) {
                    return displayEmptyText(s && s.iptvSourceUrl)
                }

                function summaryUserAgent(s) {
                    return displayEmptyText(userAgentFromHeaderLines(s && s.iptvSourceRequestHeaders))
                }

                async function postPartial(partial) {
                    vant.showLoadingToast({ message: '加载中...', forbidClick: true, duration: 0 })
                    try {
                        await requestApi('/api/settings', {
                            method: 'POST',
                            body: JSON.stringify(partial),
                            headers: { 'Content-Type': 'application/json' }
                        })
                        await refreshSettings(false)
                        vant.closeToast()
                        vant.showSuccessToast('已保存')
                    } catch (e) {
                        vant.closeToast()
                        vant.showFailToast('无法修改设置')
                        console.error(e)
                        await refreshSettings(true)
                    }
                }

                async function refreshSettings(showLoading) {
                    if (showLoading === undefined) showLoading = true
                    try {
                        if (showLoading) {
                            vant.showLoadingToast({ message: '加载中...', forbidClick: true, duration: 0 })
                        }
                        settings.value = await (await requestApi('/api/settings')).json()
                        // 仅完整加载时预填默认，避免推送成功后 refresh(false) 把用户刚保存的空请求头又填回默认
                        if (showLoading) {
                            const h = settings.value.iptvSourceRequestHeaders
                            if (h == null || String(h).trim() === '') {
                                settings.value.iptvSourceRequestHeaders = DEFAULT_IPTV_REQUEST_HEADERS
                            }
                        }
                        if (showLoading) vant.closeToast()
                    } catch (e) {
                        if (showLoading) vant.closeToast()
                        vant.showFailToast('无法获取设置')
                        console.error(e)
                    }
                }

                function pushIptv() {
                    if (!settings.value) return
                    postPartial({
                        iptvSourceUrl: settings.value.iptvSourceUrl ?? '',
                        iptvSourceRequestHeaders: settings.value.iptvSourceRequestHeaders ?? '',
                    })
                }

                function saveAdvertiseIp() {
                    if (!settings.value) return
                    postPartial({ httpServerAdvertiseIp: settings.value.httpServerAdvertiseIp ?? '' })
                }

                function pushEpg() {
                    if (!settings.value) return
                    postPartial({ epgXmlUrl: settings.value.epgXmlUrl ?? '' })
                }

                function pushPlayerUa() {
                    if (!settings.value) return
                    postPartial({ videoPlayerUserAgent: settings.value.videoPlayerUserAgent ?? '' })
                }

                onMounted(async () => {
                    await refreshSettings()
                })

                return {
                    isDark,
                    settings,
                    summaryIptvUrl,
                    summaryUserAgent,
                    pushIptv,
                    saveAdvertiseIp,
                    pushEpg,
                    pushPlayerUa,
                }
            }
        })
            .use(vant)
            .mount('#app')
    </script>
</body>

</html>
